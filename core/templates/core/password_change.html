{% extends "core/base.html" %}
{% load crispy_forms_tags %}
{% block title %}Cambiar contraseña{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-11 col-sm-8 col-md-6 col-lg-4">
    <div class="card shadow">
      <div class="card-body p-4">
        <h4 class="card-title mb-3">Cambiar contraseña</h4>
        {% if user.force_password_change %}
        <div class="alert alert-warning">Debés cambiar tu contraseña antes de continuar.</div>
        {% endif %}
        <form method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn btn-{{ user.accent_color }} w-100 mt-3">Cambiar contraseña</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
