{% extends "core/base.html" %}
{% load crispy_forms_tags %}
{% block title %}Crear usuario{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-11 col-sm-8 col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="card-title mb-3">Crear usuario</h4>
        <form method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn btn-{{ user.accent_color }} w-100 mt-3">Crear usuario</button>
          <a href="{% url 'admin_panel' %}" class="btn btn-outline-secondary w-100 mt-2">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
