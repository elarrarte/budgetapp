{% extends "core/base.html" %}
{% load crispy_forms_tags %}
{% block title %}{% if editing %}Editar{% else %}Nuevo{% endif %} presupuesto{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-11 col-sm-8 col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="card-title mb-3">{% if editing %}Editar{% else %}Nuevo{% endif %} presupuesto</h4>
        <form method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn btn-primary w-100 mt-3">Guardar</button>
          <a href="{% url 'budget_list' %}" class="btn btn-outline-secondary w-100 mt-2">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
